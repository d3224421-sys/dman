<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Puter.js Demo - Chat AI</title>
<script src="https://js.puter.com/v2/"></script>
<style>
  :root {
    --bg: #0f1115;
    --panel: #1a1d24;
    --accent: #6c63ff;
    --accent-soft: #2a2640;
    --text: #e8e8ec;
    --text-dim: #9a9aa6;
    --bubble-user: #6c63ff;
    --bubble-ai: #23262f;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    flex-direction: column;
    height: 100vh;
  }

  header {
    padding: 16px 20px;
    border-bottom: 1px solid #2a2d36;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  header .logo {
    width: 32px;
    height: 32px;
    border-radius: 8px;
    background: linear-gradient(135deg, var(--accent), #4338ca);
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: bold;
    font-size: 16px;
  }

  header h1 {
    font-size: 16px;
    margin: 0;
    font-weight: 600;
  }

  header span {
    font-size: 12px;
    color: var(--text-dim);
  }

  #chat {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .msg {
    max-width: 85%;
    padding: 10px 14px;
    border-radius: 14px;
    font-size: 14px;
    line-height: 1.4;
    word-wrap: break-word;
    white-space: pre-wrap;
  }

  .msg.user {
    align-self: flex-end;
    background: var(--bubble-user);
    color: white;
    border-bottom-right-radius: 4px;
  }

  .msg.ai {
    align-self: flex-start;
    background: var(--bubble-ai);
    border-bottom-left-radius: 4px;
  }

  .msg.ai.loading {
    color: var(--text-dim);
    font-style: italic;
  }

  form {
    display: flex;
    padding: 12px;
    gap: 8px;
    border-top: 1px solid #2a2d36;
    background: var(--panel);
  }

  input[type="text"] {
    flex: 1;
    padding: 12px 14px;
    border-radius: 12px;
    border: 1px solid #33363f;
    background: #11141a;
    color: var(--text);
    font-size: 15px;
    outline: none;
  }

  input[type="text"]:focus {
    border-color: var(--accent);
  }

  button {
    padding: 12px 18px;
    border-radius: 12px;
    border: none;
    background: var(--accent);
    color: white;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
  }

  button:disabled {
    opacity: 0.5;
  }

  #empty {
    margin: auto;
    text-align: center;
    color: var(--text-dim);
    padding: 0 24px;
  }

  #empty h2 {
    color: var(--text);
    margin-bottom: 8px;
  }
</style>
</head>
<body>

<header>
  <div class="logo">P</div>
  <div>
    <h1>Puter.js Chat Demo</h1>
    <span>Powered by puter.ai.chat()</span>
  </div>
</header>

<div id="chat">
  <div id="empty">
    <h2>Coba Puter.js AI Chat</h2>
    <p>Ketik pertanyaan di bawah dan kirim. Tidak perlu API key, semua jalan langsung dari browser.</p>
  </div>
</div>

<form id="chatForm">
  <input type="text" id="userInput" placeholder="Tulis pesan..." autocomplete="off" required>
  <button type="submit" id="sendBtn">Kirim</button>
</form>

<script>
  const chat = document.getElementById('chat');
  const empty = document.getElementById('empty');
  const form = document.getElementById('chatForm');
  const input = document.getElementById('userInput');
  const sendBtn = document.getElementById('sendBtn');

  function addMessage(text, sender) {
    if (empty) empty.remove();
    const div = document.createElement('div');
    div.className = 'msg ' + sender;
    div.textContent = text;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
    return div;
  }

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    const text = input.value.trim();
    if (!text) return;

    addMessage(text, 'user');
    input.value = '';
    sendBtn.disabled = true;

    const loadingMsg = addMessage('Mengetik...', 'ai loading');

    try {
      const response = await puter.ai.chat(text);
      loadingMsg.textContent = response;
      loadingMsg.classList.remove('loading');
    } catch (err) {
      loadingMsg.textContent = 'Error: ' + err.message;
      loadingMsg.classList.remove('loading');
    } finally {
      sendBtn.disabled = false;
      input.focus();
    }
  });
</script>

</body>
</html>
